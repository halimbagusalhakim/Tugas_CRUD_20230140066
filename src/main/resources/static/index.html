<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data KTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Aplikasi CRUD Data KTP</h2>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Form KTP</div>
                <div class="card-body">
                    <form id="ktpForm">
                        <input type="hidden" id="ktpId">
                        <div class="mb-3">
                            <label>Nomor KTP</label>
                            <input type="text" id="nomorKtp" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Nama Lengkap</label>
                            <input type="text" id="namaLengkap" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Alamat</label>
                            <textarea id="alamat" class="form-control" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Jenis Kelamin</label>
                            <select id="jenisKelamin" class="form-select" required>
                                <option value="">Pilih Jenis Kelamin</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="btnSave">Simpan Data</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="btnCancel">Batal</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Daftar KTP</div>
                <div class="card-body">
                    <table class="table table-bordered table-hover">
                        <thead>
                        <tr>
                            <th>No KTP</th>
                            <th>Nama</th>
                            <th>Alamat</th>
                            <th>Tgl Lahir</th>
                            <th>Jenis Kelamin</th>
                            <th>Aksi</th>
                        </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const API_URL = "http://localhost:8080/ktp"; // Sesuaikan dengan port Spring Boot

    $(document).ready(function() {
        loadData();

        // Handle Submit Form (POST / PUT)
        $("#ktpForm").submit(function(e) {
            e.preventDefault();
            const id = $("#ktpId").val();
            const data = {
                nomorKtp: $("#nomorKtp").val(),
                namaLengkap: $("#namaLengkap").val(),
                alamat: $("#alamat").val(),
                tanggalLahir: $("#tanggalLahir").val(),
                jenisKelamin: $("#jenisKelamin").val()
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_URL}/${id}` : API_URL;

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function(response) {
                    showAlert(response.message, "success");
                    resetForm();
                    loadData();
                },
                error: function(xhr) {
                    const res = JSON.parse(xhr.responseText);
                    showAlert(res.message || "Terjadi kesalahan!", "danger");
                }
            });
        });

        // Tombol Batal Edit
        $("#btnCancel").click(function() {
            resetForm();
        });
    });

    // GET: Memuat semua data
    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function(response) {
                let html = "";
                if(response.data.length === 0) {
                    html = "<tr><td colspan='6' class='text-center'>Tidak ada data</td></tr>";
                } else {
                    response.data.forEach(function(ktp) {
                        html += `
                            <tr>
                                <td>${ktp.nomorKtp}</td>
                                <td>${ktp.namaLengkap}</td>
                                <td>${ktp.alamat}</td>
                                <td>${ktp.tanggalLahir}</td>
                                <td>${ktp.jenisKelamin}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning" onclick="editData(${ktp.id})">Edit</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteData(${ktp.id})">Hapus</button>
                                </td>
                            </tr>
                        `;
                    });
                }
                $("#tableBody").html(html);
            }
        });
    }

    // GET by ID: Masukkan ke Form untuk Edit
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function(response) {
                const ktp = response.data;
                $("#ktpId").val(ktp.id);
                $("#nomorKtp").val(ktp.nomorKtp);
                $("#namaLengkap").val(ktp.namaLengkap);
                $("#alamat").val(ktp.alamat);
                $("#tanggalLahir").val(ktp.tanggalLahir);
                $("#jenisKelamin").val(ktp.jenisKelamin);

                $("#btnSave").text("Update Data").removeClass("btn-success").addClass("btn-warning");
                $("#btnCancel").removeClass("d-none");
            }
        });
    }

    // DELETE: Menghapus Data
    function deleteData(id) {
        if(confirm("Yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function(response) {
                    showAlert(response.message, "success");
                    loadData();
                },
                error: function() {
                    showAlert("Gagal menghapus data", "danger");
                }
            });
        }
    }

    // Fungsi utilitas UI
    function resetForm() {
        $("#ktpForm")[0].reset();
        $("#ktpId").val("");
        $("#btnSave").text("Simpan Data").removeClass("btn-warning").addClass("btn-success");
        $("#btnCancel").addClass("d-none");
    }

    function showAlert(message, type) {
        const alertBox = $("#alertBox");
        alertBox.removeClass("d-none alert-success alert-danger").addClass(`alert-${type}`).text(message);
        setTimeout(() => alertBox.addClass("d-none"), 4000);
    }
</script>
</body>
</html>
